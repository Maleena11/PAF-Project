
server.port=8080

# ── Database (MySQL) ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smartcampus?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
#spring.datasource.password=Luckygirl2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Database (H2 - development) ─────────────────────────────────────────────────
# spring.datasource.url=jdbc:h2:mem:smartcampusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console


# ── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ── SQL Init ───────────────────────────────────────────────────────────────
spring.sql.init.mode=always

# ── File Upload ────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ── OAuth2 Google ──────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── JWT ────────────────────────────────────────────────────────────────────
app.jwt.secret=smartcampus-super-secret-key-change-in-production-2024
app.jwt.expiration-ms=86400000
app.frontend.url=http://localhost:5173

# ── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
